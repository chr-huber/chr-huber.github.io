    <div id="jumbo-random" class="jumbotron jumbo-bg-3" style="padding-top: 18px; padding-bottom: 18px;">
        <div style="height: 180px; position: relative;">
            <div class="container roboto-slab-regular" style="max-width:950px; background: rgba(255,255,255,0.82);
            padding-top:15px; padding-bottom:0px; margin-top:5px;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);">

                    Presentations
                </p>

    <!-- PASSWORD GATE -->
    <section id="password-gate">
        <div class="container" style="max-width:520px; padding-top: 60px; padding-bottom: 80px;">
            <div class="row">
                <div class="col-xs-12">
                    <div class="panel panel-default" style="padding: 28px 36px 24px;">
                        <p class="roboto-slab-regular" style="color: #2C3E50; font-size: 15px; margin-bottom: 18px;">
                            This page is password protected.
                        </p>
                        <div class="form-group" style="margin-bottom: 8px;">
                            <input type="password" id="pw-input" class="form-control"
                                   placeholder="Password" autofocus style="font-size: 14px;">
                        </div>
                        <p id="pw-error" style="display:none; color:#B8664D; font-size:13px; margin-bottom:10px;">
                            Incorrect password.
                        </p>
                        <div class="checkbox" style="font-size:13px; color:#6B6B6B; margin-top:10px; margin-bottom:14px;">
                            <label>
                                <input type="checkbox" id="pw-remember"> Remember me in this browser
                            </label>
                        </div>
                        <button id="pw-btn" class="btn btn-default" style="background-color:#2C3E50; color:white; border-color:#2C3E50; font-size:13px; padding: 6px 20px;">
                            Unlock
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- PRESENTATIONS CONTENT -->
    <section id="pres-content" style="display:none;">
        <div class="container" style="max-width:970px; padding-top: 20px; padding-bottom: 20px;">

            <div class="row" style="padding-bottom: 4px;">
                <div class="col-sm-12">
                    <p style="font-size:13px; color:#6B6B6B; margin-bottom:4px;">
                        Presentation slides.
                        <a href="#" id="pw-lock" style="float:right; font-size:12px; color:#B8664D;">
                            <i class="fas fa-lock"></i> Lock
                        </a>
                    </p>
                    <hr style="margin-top:4px; margin-bottom:16px;">
                </div>
            </div>

            <div class="row" style="margin-bottom: 12px;">
                <div class="col-sm-12" style="font-size:13px; color:#6B6B6B;">
                    Group by:
                    <label style="margin-left:10px; font-weight:normal;">
                        <input type="radio" name="group-by" value="topic" checked> Topic
                    </label>
                    <label style="margin-left:10px; font-weight:normal;">
                        <input type="radio" name="group-by" value="year"> Year
                    </label>
                    <label id="group-filter-label" for="group-filter" style="margin-left:16px; margin-bottom:0; font-weight:normal;">Topic:</label>
                    <select id="group-filter" class="form-control input-sm" style="display:inline-block; width:auto; min-width:170px; margin-left:6px; height:28px; padding-top:2px; padding-bottom:2px; font-size:12px;">
                        <option value="__all__">All topics</option>
                    </select>
                </div>
            </div>

            <div id="presentations-list"></div>

            <hr style="margin-top: 20px;">
            <div>
                <p class="roboto-slab-regular" style="text-align:right; font-size:small; color: gray">
                    © 2025 Christoph Huber
                </p>
            </div>

        </div>
    </section>
