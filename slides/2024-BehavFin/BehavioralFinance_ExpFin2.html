# Trading decisions 

Why do people trade on a stock market?

--

- Trade only happens, when there are different expectations and opinions in a market.
- If everyone has the same valuation, no one should trade.

--

What determines your trading/investment decision?

--

- (risk) preferences

- expectations

--

- Behavioral Factors?

  - heuristics and biases: e.g., framing effects, status quo bias, endowment effect, representativeness heuristic, 
  availability heuristic, anchoring, ... 
  - overconfidence
  - etc. ...

# Prices reflect expectations

- Assume the stock of Apple currently trades at 100 and the market expects an increase in the profit of 25%.

- At a press conference the CEO proudly reveals _"We had a very good year and were able to increase the profit by 20%!"_

- How will the stock price react?

&lt;br&gt;

--

- The announcement _"China‘s economy grows by 3%“_ would likely lead to a market crash.
&lt;br&gt; The message _"Germany‘s economy grows by 3%"_ to a positive price jump.

# Stock prices and expectations

- 2009-2019 the Chinese economy grew by a cumulative +180%, the German economy grew by only +14%.

- 1900 Louis Bachelier
- 1953 Maurice Kendall

# Three Forms of Market Efficiency

Depending on the definition of „all available information“ one can distinguish 3 forms of market efficiency:

--

- __Weak-form efficiency__: _All historical information is already included in the market price_. Thus, nobody can gain above-average returns by developing trading rules based on past prices.

--

- __Semistrong-form efficiency__: At the time _public information_ (annual reports, dividends announcements,…) is issued, it _is immediately incorporated in the market price_. So, if markets are semistrong efficient, nobody can generate excess returns by trading on public information.

--

- __Strong-form efficiency__: _All possible information_ (insider information, information of experts,…) _is included in the market price_. Therefore, if markets are efficient in its strong form, not even insiders can expect excess returns. 

---

# Empirical Evidence

- New information (e.g. a press-conference or a terrorist attack) is rapidly reflected in prices

- At the NYSE prices take on average only 7 seconds to incorporate new information (that was in 2002, today likely much faster)!

&lt;br&gt;

- This suggests, that at least the largest and most developed markets are semi-strong form efficient.

---

# Empirical Evidence

- However, spectacular cases of insider trading show that insiders are able to make excess profits

- E.g. ENRON: Before the collapse the managers sold their shares at still high prices and made 620 million $.

&lt;br&gt;

- This suggests, that markets are not strong-form efficient.

# Information Paradoxon

- If all information is already included in prices the expected return in the market should be the same for everyone, as gathering information does not help to improve it.

--

- If this is true no one will gather information, as this is costly.

--

- But if nobody gathers information, how should prices reflect all – or even any information?

--

`\(\rightarrow\)` __information paradoxon__

# Inefficient Markets

.pull-left[
.center[
![:width 55%](figures/shiller.jpg)
]
]

.pull-right[
Robert Shiller &lt;br&gt;
(Nobel Laureate 2013)

"In the 1960s, Eugene Fama demonstrated that stock price movements are impossible to predict in the short-term. In the early 1980s, however, Robert Shiller discovered that _stock prices can be predicted_ over a longer period, such as over the course of several years. In contrast to the dominant perception, stock prices fluctuated much more than corporate dividends. Shiller's conclusion was therefore that _the market is inefficient_."
(from [NobelPrize.org](https://www.nobelprize.org/prizes/economic-sciences/2013/shiller/facts/))
]

# Performance of Mutual Funds

- Jensen (1968): USA, 1945-1964; Underperformance of 1.1 percentage points p.a. before costs

- Brinson/Hood/Beebower (1986): USA, 1974-1983; Underperformance of 1.1 percentage points after costs; Market timing and stock picking decrease the net return

- Malkiel (1995): USA, 1971-1991; Underperformance of 2.3 percentage points after costs

- Gruber (1996): USA, 1985-1994; Underperformance of 1.9 percentage points after costs

- Wermers (2000): USA, 1975-1994; Outperformance (Underperformance) of 1.3 (1.0) percentage points before (after) costs.

- Griese/Kempf (2003): Germany, 1980-2000; Underperformance of 1.5 percentage points p.a. after costs
