# Experimental Economics ... and Finance?

- application of experimental methods to study economic questions &lt;br&gt;
  in a _controlled environment_

- monetary payments used to mimic real-world incentives

--

From Bergstrom &amp; Miller: "Taking part in classroom experiments is a little like going to dinner at a cannibal’s house. Sometimes you will be the diner, sometimes you will be part of the dinner, sometimes both. &lt;br&gt;
It is hard to imagine that a chemist can put herself in the place of a hydrogen molecule, or that a biologist knows what it feels like to be a duck. But here we are &lt;b&gt;studying the behavior and interactions of people in economically interesting situations.&lt;/b&gt; In the experiment, you will be one of these interacting economic agents, you will be able to experience the problems faced by such an agent first-hand.
&lt;br&gt;
We suspect that you will learn nearly as much about strategic analysis and behavior from your experience as a participant as you will from your analysis as an observer."

# Why Experimental Finance?

Why do we need even more data? Isn‘t there enough real data, especially in finance?

--

- "Real" data typically includes many unobservable events that had an influence of market data (prices).

- E.g. we normally cannot know investor’s expectations.

- Theory of financial markets (and economics of uncertainty) is built on expectations.

- We thus need data on expectations to distinguish among competing theories.

---

# Why Experimental Finance?

- In a controlled experiment, the researcher can affect the expectations and knows the underlying parameters.

- With this knowledge, we know for example the assets' fundamental values and also other predictions of alternative theories.

- We can therefore conduct powerful tests of theories which were not possible from the field data (because we know little about the parameters and expectations that generate the field data from the stock exchanges).

--

`\(\rightarrow\)` _control_

# Stock Market Experts vs. Laypeople 1 - Study

Törngren/Montgomery (2004):

- 2 groups of subjects: Lay people (students in psychology) vs. professionals (Broker, investment adviser, portfolio manager, analysts,…)

- Estimation of the 30-day percentage change in stock prices of 20 Blue-Chip-stocks at the Stockholm stock exchange (Information: Company names, industry, monthly returns of the previous 12 months)

  - Further tasks: Estimation of your own prediction error in percentage points: (|estimated return – realized return|) and estimation of the average estimation errors of the professionals and the lay people.
  
- The stocks have been paired and the subjects had to estimate which of the 2 stocks will perform better within the next 30 days.

  - Furthermore, subjects had to predict the accuracy of their estimation.

# Stock Market Experts vs. Laypeople 1 - Interpretation

Törngren/Montgomery (2004):

- Task 1: Prediction errors of both groups did not differ significantly
  
  – Overconfidence: experts estimate that their prediction errors are much smaller than they really are.
  
  – Both groups believe that experts exhibit much lower prediction errors than lay people.

- Task 2: Lay people are right in approx. 50% of all estimations, whereas experts are right only approx. 40% of the time (note: a random generator would be right 50% of the time!)  

  – Again, there is overconfidence in both groups, whereas it is much stronger pronounced in the experts group. Experts believe that they are right in 65% of all cases, whereas the number is only 58% for lay people.

???

The yellow circle within each spike represents subjects’ mean point prediction, while the lower and upper capped spikes represent the means of subjects’ self-reported 10% and 90% quantile for their return estimates. The line between the capped spikes thus shows the average size of subjects’  80% confidence interval for their forecasts. The green diamonds represent the corresponding information signals that were provided to subjects before they entered their estimates. The leftmost of each set of three capped spikes represents subjects’ predictions in treatment I_NO

First, we focus on the yellow circles representing the corresponding average point prediction
for each spike. On the middle of each group of three spikes (representing treatment
IGP) we see that the provided signal is always comparatively high (between 6 and 10 percent
expected return for the next month), which is welcome for our analysis, as we can
then clearly see whether subjects’ forecasts are influenced by these signals. By visual
inspection it seems that this is indeed the case: subjects take the provided information
signal into account when making their forecasts as the average forecasts in treatment
IGP are always higher, by up to two percentage points, than in the baseline treatment
INO. 

A second main observation is that subjects only partly follow the provided signals,
as their forecasts are higher, but the (comparatively high) signal in treatment IGP is always
above the 90% quantile of forecasts – this holds for all twelve sub-groups in this
treatment. 

As a third observation we see that also subjects from the finance industry
tend to follow the signal from the general population, even though to a slightly smaller
degree than subjects from the general population, as on all four pairwise comparisons
the mean estimate of the general population is closer to the provided signal than the
mean of people from the finance industry

Turning to treatment IFI, in which we provide forecasting signals from the finance industry, we see that the signals are on average markedly
lower than the (relatively high) ones in treatment IGP and usually very close to the average
forecasts elicited in treatment INO. Thus, we cannot as unequivocally judge whether
subjects follow the signal and find only minor differences between the level of return
predictions in treatments INO and IFI

# Stock Market Experts vs. Laypeople 2 - Results

Huber et al. (2019):

.pull-left[
![:width 100%](figures/fc_error_us_for_sp500_withoutTopandBottom.svg)
]

.pull-right[
![:width 100%](figures/fc_error_us_for_ftse100_withoutTopandBottom.svg)
]

--

- all subject pools expect lower estimation errors for financial professionals 
than for laypeople `\(\rightarrow\)` _trust in experts_

???

For each asset and for each subject group, the estimated forecasting errors for the general
population (yellow bars) are consistently higher than the estimated forecasting errors
for financial professionals (blue bars) as the blue bar is lower than the yellow one in
each panel. This difference is statistically significant at the 5% level in 13 out of 16
comparisons. As a key observation, we thus report that all subject groups expect more
accurate forecasts by financial professionals than by people from the general population.
This confidence, however, is unjustified in our study, as we find no significant difference
between the actual forecasting errors of financial professionals and laypeople. Hence,
we can draw two conclusions: First, financial professionals are too optimistic about their
own forecasting accuracy compared to the predictions of the general population. And
second, the latter are also convinced of the superior performance of financial experts
compared to their own forecasting abilities. This result is consistent with – and might
be a reason for – our findings above that especially laypeople act on the information
signals provided by financial professionals, supposedly as they trust these signals more
than their own judgement.

# Myopic Loss Aversion

_Suppose an investor must choose between a risky asset that pays an
expected 8 percent per year with a standard deviation of 20 percent (like stocks)
and a safe asset which pays a sure 1 percent._

--

What does the attractiveness of the risky asset depend on?
--
`\(\rightarrow\)` the investor's time horizon

--

&lt;br&gt;

_Consider the following prospect: $200 with 50% prob. or -$100 otherwise_

--

- One-shot? `\(0.5 \times 200 + 2.25 \times 0.5 \times (-100) = -12.5\)`

--

- But what if the prospect is allowed to be run twice _before the investor notes the result_?

--

  - `\(0.25 \times 400 + 0.5 \times 100 + 2.25 \times 0.25 \times (-200) = 37.5\)`

--

Benartzi &amp; Thaler (1995): equity premium follows from people being loss averse and
fairly frequently evaluating their wealth position (ca. once every year).
`\(\rightarrow\)` Myopic Loss Aversion

# Incentives and Social Competition in &lt;br&gt; the Finance Industry

- Fund managers and hedge fund managers face rankings of all kinds and thus have 
implicit _tournament incentives_.

--

- Hedge funds and the __2/20-rule__: managers receive 2% of assets
under management and 20% of the profits. As assets under
management are a convex function of past performance, _the 2%-_
_component is a tournament component_.

--

.pull-left[
- So, their salary is a convex function of past outperformance to the
market.
]

.pull-right[
![:width 65%](figures/hedgefundflow.png)
]

# Incentives and Social Competition in &lt;br&gt; the Finance Industry

Kirchler et al. (2018):

- Investment game experiment: risk-free return (RF): 1.5%; risky asset (RISK):
expected return of 3.6%, s.d. of 15.9%; 8 periods. Investments in
RISK from 0% to 200%.

- 3 Treatments, with Students and with __Financial Professionals__:

  – Treatment TBASE: payout according to subject's end wealth.
Initial endowment: 90 Euro (30 for students).

  – Treatment TRANK: identical to TBASE BUT a non-incentivized
and anonymous ranking is displayed after each period (in a
group of 6).

  – Treatment TTOUR identical to TRANK, BUT payout is
according to anonymous ranking. Rank 1: 50% of the cake,
Rank 2: 33.3%, Rank 3: 16.7%, Ranks 4-6: zero.

# Incentives and Social Competition in &lt;br&gt; the Finance Industry

Kirchler et al. (2018):

- Both rank and tournament incentives increase risk-taking among underperforming professionals.

- Only tournament incentives affect students.

- Results are robust to the experimental frame
(investment frame vs. abstract frame), to payoff consequences (own return vs. family
return), to social identity priming (private identity vs. professional identity), and to
professionals’ gender (no gender differences among professionals).

# Are bankers any different to "normal" people?

Holmen et al. (2021):

- Two participant groups: financial professionals and a general population sample

- Series of experimental tasks: attitudes towards risk, losses, and skewness; distributional (social) preferences;
trust and trustworthiness; (dis)honesty behavior; and personality traits

- Experimental data merged with __registry data__ on socio-economic characteristics (Statistics Sweden)

---

# Are bankers any different to "normal" people?

Holmen et al. (2021):

.pull-left[
- Bankers are ...
]

---

# Are bankers any different to "normal" people?

Holmen et al. (2021):

.pull-left[
- Bankers are ...

  - more risk tolerant,
  - more selfish,
  - less trustworthy,
  - more competitive,

- ... and show ...

  - higher levels of narcissism, 
  - higher levels of psychopathy, 
  - higher levels of Machiavellianism
]

--

.pull-right[
But after controlling for their socio-economic background, many effects disappear
and are deflated. What remains is:

- Bankers are ...

  - less risk averse,
  - less trustworthy, 
  - more competitive,
  - and slightly more psychopathic than the general population
  
]
